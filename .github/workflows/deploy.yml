The Deploy Dashboard workflow is running but failing. Let me check the error:

The issue is the workflow is looking for files in a `hiring-tracker` subfolder, but the files are in the repo root. The `deploy.yml` was written for a repo where `hiring-tracker` is a subfolder — but your GitHub repo has the files directly at the root. Let me fix the workflow:

Now update it on GitHub — go to **[github.com/911Idonotcode/recruiting-dashboard/blob/main/.github/workflows/deploy.yml](https://github.com/911Idonotcode/recruiting-dashboard/blob/main/.github/workflows/deploy.yml)**, click the **pencil (edit) icon**, replace the content with the corrected version below, then commit:

```yaml
name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Import Gem pipeline CSV
        if: ${{ hashFiles('gem-exports/pipeline.csv') != '' }}
        run: node scripts/gem-import.js --pipeline gem-exports/pipeline.csv

      - name: Import Gem outreach CSV
        if: ${{ hashFiles('gem-exports/outreach.csv') != '' }}
        run: node scripts/gem-import.js --outreach gem-exports/outreach.csv

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js data.json
          git diff --cached --quiet || git commit -m "chore: auto-update data.json from Gem export [skip ci]"
          git push
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
```
